version: 1

document:
  output: "./build/Go-tasks1-report.docx"
  toc: true
  title_page:
    template: rut
    params:
      discipline: "Инфраструктурное программное обеспечение"
      work_number: "№ 1"
      work_title: "Go. Задания часть 1"
      student: "Купленик С. С."
      group: "УВП-171"
      teacher: "Старший преподаватель кафедры ЦТУТП Заманов Е. А."
      year: "2026"

content:
  - type: heading
    text: "Цель работы"
    level: 1
    structural: true

  - type: paragraph
    text: >
      Цель работы состояла в практической проверке набора задач по языку Go, посвящённых поведению структур, указателей, методов,
      сериализации JSON, выравниванию памяти, embedding и поверхностному копированию. Важной частью задания было не просто получить ответ,
      а понять, почему программа ведёт себя именно так и какое свойство языка этим подтверждается.

  - type: heading
    text: "Ход работы"
    level: 1
    structural: true

  - type: paragraph
    text: >
      Для каждой задачи был создан отдельный каталог с самостоятельным файлом main.go. Все примеры запускались в одинаковом окружении контейнера Go,
      что исключало влияние локальной конфигурации и позволяло фиксировать именно поведение языка. Часть примеров по смыслу задания должна была
      завершаться ошибкой, поэтому такие случаи рассматривались как ожидаемое подтверждение теоретического положения.

  - type: heading
    text: "Структуры, указатели и сравнимость"
    level: 2
    structural: false

  - type: paragraph
    text: >
      Первая группа задач показала, как Go различает zero value структуры, nil-указатели и сравнимые типы. В примере с двумя переменными u1 и u2
      программа сначала обращается к полю пустой структуры без ошибки, а затем завершается сообщением panic: invalid memory address or nil pointer dereference
      при попытке доступа к полю через nil-указатель. Это подтверждает, что zero value структуры остаётся допустимым объектом,
      а nil-указатель не содержит экземпляра, к полям которого можно обращаться.

  - type: paragraph
    text: >
      В задаче на сравнение структур компилятор вернул сообщение invalid operation: b1 == b2 (struct containing []bool cannot be compared).
      Тем самым подтверждается правило языка: структура сравнима только тогда, когда сравнимы все её поля. Появление среза делает всё значение несравнимым,
      и ошибка возникает ещё до запуска программы.

  - type: heading
    text: "Выравнивание памяти и сериализация"
    level: 2
    structural: false

  - type: paragraph
    text: >
      Задача на размер структур показала практический эффект выравнивания памяти. Программа вывела Size of S1: 24 и Size of S2: 16,
      хотя набор полей в обеих структурах одинаков по составу. Следовательно, порядок объявления полей напрямую влияет на объём padding
      и может уменьшать или увеличивать размер объекта в памяти.

  - type: paragraph
    text: >
      Пример с json.Marshal завершился выводом {"name":"Alice"}. Поле password в JSON не попало, поскольку оно неэкспортируемое.
      Этот результат подтверждает одновременно и правила видимости в Go, и поведение стандартного пакета encoding/json,
      который по умолчанию сериализует только экспортируемые поля структуры.

  - type: heading
    text: "Методы и поведение получателя"
    level: 2
    structural: false

  - type: paragraph
    text: >
      В задаче о методах после вызова метода со значением имя объекта осталось Bob, а после вызова метода с указателем изменилось на Eve.
      Такой результат показывает, что value receiver работает с копией структуры, тогда как pointer receiver воздействует на исходный объект.
      Эта разница принципиальна при проектировании методов, которые должны менять состояние значения.

  - type: paragraph
    text: >
      Дополнительный пример с вызовом метода у nil-указателя завершился сообщением I am nil! и не привёл к panic.
      Причина состоит в том, что метод явно проверяет состояние n == nil и сам корректно обрабатывает такой случай.
      Следовательно, допустимость вызова метода у nil-значения зависит от реализованной логики, а не от автоматической защиты языка.

  - type: heading
    text: "Range, пустые структуры и embedding"
    level: 2
    structural: false

  - type: paragraph
    text: >
      Пример с циклом range над срезом структур вывел false. Это означает, что переменная цикла содержала копию элемента,
      и изменение поля внутри цикла не затронуло исходный срез. На практике такой результат требует либо итерирования по индексам,
      либо явной работы с указателями, если требуется модификация исходных данных.

  - type: paragraph
    text: >
      Задача с пустой структурой показала, что struct{} имеет нулевой размер как тип данных, а вывод Size of slice 'a': 24 относится
      к размеру заголовка slice, а не к сумме всех элементов. Это важное уточнение для понимания модели памяти Go: размер контейнера
      и размер массива, на который он ссылается, не совпадают.

  - type: paragraph
    text: >
      В примере с embedding программа вывела Red. Тем самым подтверждается, что при наличии одноимённых полей приоритет получает поле внешней структуры.
      Обращение к полю вложенной структуры остаётся возможным, но требует явной квалификации через имя вложенного значения.

  - type: heading
    text: "Поверхностное копирование"
    level: 2
    structural: false

  - type: paragraph
    text: >
      Последняя задача показала характерный эффект поверхностного копирования структуры со срезом. После копирования программа вывела
      w1: 1 [rust backend] и w2: 2 [rust backend]. Из этого следует, что обычное поле ID было скопировано независимо,
      тогда как поле Tags продолжило ссылаться на общий underlying array. Пример наглядно демонстрирует разницу между копированием значения структуры
      и фактическим разделением данных внутри ссылочных полей.

  - type: heading
    text: "Заключение"
    level: 1
    structural: true

  - type: paragraph
    text: >
      В ходе работы были воспроизведены все десять задач первой части по языку Go. Эксперименты подтвердили ключевые особенности языка:
      правила сравнения типов, различия между value и pointer receiver, влияние порядка полей на размер структуры, поведение range,
      специфику embedding и поверхностного копирования. Работа выполнена не только формально, но и с анализом причин полученных результатов,
      поэтому поставленная цель достигнута полностью.


