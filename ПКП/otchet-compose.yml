content:
  - type: heading
    text: "Цель работы"
    level: 1
    structural: true

  - type: paragraph
    text: >
      Цель работы состояла в разборе архитектурных кейсов, связанных с микросервисной декомпозицией, распределённой согласованностью,
      общим владением данными, сервисной координацией и платформенными обязанностями. По каждому кейсу требовалось не просто назвать вариант ответа,
      а выбрать архитектурное решение и обосновать его с точки зрения практических последствий для эксплуатации, масштабирования и сопровождения системы.

  - type: heading
    text: "Ход работы"
    level: 1
    structural: true

  - type: paragraph
    text: >
      Работа представляла собой последовательный анализ десяти кейсов. В каждом случае оценивались границы сервисов, характер связности,
      последствия shared ownership, допустимость eventual consistency и влияние решения на управляемость всей системы.
      Основной принцип разбора состоял в том, что архитектурное решение должно уменьшать не только логическую, но и эксплуатационную связанность.

  - type: heading
    text: "NotificationService и разные каналы доставки"
    level: 2
    structural: false

  - type: paragraph
    text: >
      Хотя email, push и SMS относятся к одной предметной области уведомлений, их эксплуатационная ценность различается.
      OTP-SMS является критичным и чувствительным к задержкам каналом, тогда как почтовая рассылка обычно терпимее к сбоям и временной деградации.
      По этой причине разделение сервиса, как минимум с вынесением SMS в отдельный компонент, является более устойчивым решением.
      Оно не позволяет проблемам в email-стеке влиять на критический путь аутентификации и повышает управляемость нагрузки.

  - type: heading
    text: "Order, Payment и Inventory без возврата к монолиту"
    level: 2
    structural: false

  - type: paragraph
    text: >
      Возврат к монолиту только ради жёсткой транзакционности выглядит избыточным, если бизнес-процесс допускает управляемую последовательность шагов.
      В большинстве таких случаев предпочтительнее saga-подход с компенсациями. Он позволяет сохранить автономность сервисов и одновременно
      зафиксировать понятную бизнес-логику отката. Укрупнение границ сервисов оправдано лишь тогда, когда даже краткий период eventual consistency
      принципиально недопустим для предметной области.

  - type: heading
    text: "Choreography и длинный бизнес-процесс"
    level: 2
    structural: false

  - type: paragraph
    text: >
      При большом количестве участников чистая choreography начинает хуже масштабироваться по наблюдаемости.
      Если один из сервисов перестаёт публиковать ожидаемое событие, процесс становится трудно диагностировать и сопровождать.
      Поэтому для длинных сценариев с множеством зависимых шагов более оправдан coordinator или orchestration.
      Центральный управляющий компонент в таком случае полезен тем, что хранит общее состояние процесса, таймауты и правила компенсации.

  - type: heading
    text: "Общая логика в разнородном технологическом стеке"
    level: 2
    structural: false

  - type: paragraph
    text: >
      Когда одна и та же бизнес-логика требуется сервисам на Go, Java и Node, shared library перестаёт быть по-настоящему общей.
      Она превращается в несколько реализаций с риском рассинхронизации и различий в поведении. В такой ситуации отдельный расчётный сервис
      выглядит более последовательным решением: он немного увеличивает сетевую связанность, но обеспечивает единство логики,
      централизованное обновление и одинаковый результат для всех потребителей.

  - type: heading
    text: "Shared library под давлением security-инцидента"
    level: 2
    structural: false

  - type: paragraph
    text: >
      Критическая библиотека с zero-day хорошо демонстрирует обратную сторону удобства повторного использования кода.
      Пока всё работает штатно, библиотека уменьшает дублирование. Но при аварийном обновлении она превращается в точку массовой координации:
      необходимо срочно выпускать несколько поддерживаемых веток и синхронно раскатывать их по множеству сервисов.
      Следовательно, shared library снижает связанность на уровне исходного кода, но может резко повысить связанность при эксплуатации и антикризисном сопровождении.

  - type: heading
    text: "Cross-cutting concerns и platform layer"
    level: 2
    structural: false

  - type: paragraph
    text: >
      Логирование, трассировка, аутентификация и circuit breaking не должны заставлять систему возвращаться к монолиту.
      Гораздо рациональнее вынести такие обязанности в платформенный слой: gateway, sidecar, service mesh или централизованные middleware-компоненты.
      Тогда бизнес-сервисы остаются проще и чище, а инфраструктурные механизмы развиваются как самостоятельная capability платформы.

  - type: heading
    text: "Audit как пример shared ownership данных"
    level: 2
    structural: false

  - type: paragraph
    text: >
      Совместная запись нескольких сервисов в одну audit-таблицу удобна только на первом этапе. Дальше она создаёт зависимость по схеме базы данных,
      осложняет эволюцию формата записи и делает владение данными размытым. Более зрелым вариантом является выделенный Audit service,
      принимающий события от других сервисов и единолично управляющий своим хранилищем. Такой подход лучше соответствует природе append-only сценария.

  - type: heading
    text: "Catalog и Inventory как разные владельцы данных"
    level: 2
    structural: false

  - type: paragraph
    text: >
      Описание товара и его остатки часто показываются рядом, но это не делает их единым объектом владения.
      Каталог описывает товар и меняется сравнительно редко, тогда как остатки являются оперативными данными и подвержены постоянным изменениям.
      Поэтому разделение владения между Catalog и Inventory представляется более правильным, чем совместная таблица.
      Согласование между сервисами удобно строить через событие создания товара и последующую локальную материализацию данных в Inventory.

  - type: heading
    text: "Локальная read-модель для Appointment"
    level: 2
    structural: false

  - type: paragraph
    text: >
      Если Appointment всякий раз синхронно обращается к PatientManagement ради чтения статусов, интерфейс начинает зависеть от внешней сети и внешнего SLA.
      При этом владение статусами действительно может оставаться у PatientManagement. Компромиссным решением становится локальная read-модель или кэш,
      который уменьшает латентность и снижает связанность на чтении, не разрушая исходную доменную ответственность.

  - type: heading
    text: "Выделение владельца тарификации"
    level: 2
    structural: false

  - type: paragraph
    text: >
      Когда BillingProcessor и SubscriptionManager совместно владеют тарифной логикой, архитектурная проблема проявляется не только технически,
      но и организационно: для изменений требуются синхронные действия двух команд. Выделение отдельного владельца тарификации делает границы ответственности явными.
      Да, при этом появляется дополнительный сервис и новые сетевые вызовы, но система становится проще для сопровождения и дешевле в координации релизов.

  - type: heading
    text: "Заключение"
    level: 1
    structural: true

  - type: paragraph
    text: >
      Анализ десяти кейсов показал, что главные архитектурные проблемы чаще всего возникают там, где размыто владение данными,
      недооценена эксплуатационная связанность или смешаны бизнес- и платформенные обязанности. Наиболее устойчивые решения во всех рассмотренных примерах
      строятся вокруг явного владельца данных, событийной интеграции и осознанного отношения к eventual consistency.
      Поставленная цель достигнута: для каждого кейса сформулировано решение и объяснены его практические компромиссы.


