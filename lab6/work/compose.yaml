services:
  front:
    image: nginx:1.25-alpine
    ports:
      - "18888:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
    configs:
      - source: nginx_config
        target: /etc/nginx/conf.d/default.conf
    depends_on:
      - back
    restart: always
    networks:
      - front

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./users.sql:/docker-entrypoint-initdb.d/users.sql:ro
      - db-data:/var/lib/postgresql/data
    networks:
      - db

  back:
    build: .
    depends_on:
      - db
    secrets:
      - connection_string
    networks:
      - front
      - db

configs:
  nginx_config:
    file: ./default.conf

secrets:
  connection_string:
    environment: DB_CONN

volumes:
  db-data:

networks:
  front:
  db:
